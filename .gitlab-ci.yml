stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $HARBOR_URL/$HARBOR_PATH/insider-nest

# =========================
# BUILD (FE + BE)
# =========================
build_app:
  stage: build
  image: node:20
  script:
    # ===== BUILD REACT =====
    - cd insider-fe
    - npm ci
    - npm run build

    # ===== BUILD NEST =====
    - cd ../insider-nest
    - npm ci

    # copy FE build ke Nest
    - mkdir -p public
    - cp -r ../insider-fe/dist/* public/

    # prisma generate
    - npx prisma generate

    # build nest
    - npm run build

  artifacts:
    paths:
      - insider-nest

# =========================
# DOCKER + HARBOR + OKD (PROD ONLY)
# =========================
deploy_prod:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build_app
  before_script:
    - docker login $HARBOR_URL -u $HARBOR_USER -p $HARBOR_PASS
  script:
    - export IMAGE_NAME=$HARBOR_URL/$HARBOR_PATH/insider-nest
    - export IMAGE_TAG=$CI_COMMIT_SHA

    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f insider-nest/Dockerfile .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest

    - apk add --no-cache curl libc6-compat
    - curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
    - tar -xvf oc.tar.gz
    - chmod +x oc

    - ./oc login $OPENSHIFT_SERVER_PRD --username=$OPENSHIFT_USER_PRD --password=$OPENSHIFT_PASS_PRD --insecure-skip-tls-verify
    - ./oc project $OPENSHIFT_PROJECT_PRD

    # ✅ Buat/update pull secret untuk Harbor
    - |
      ./oc create secret docker-registry harbor-secret \
        --docker-server=$HARBOR_URL \
        --docker-username=$HARBOR_USER \
        --docker-password=$HARBOR_PASS \
        --namespace=$OPENSHIFT_PROJECT_PRD \
        --dry-run=client -o yaml | ./oc apply -f -

    # ✅ Link secret ke service account
    - ./oc secrets link default harbor-secret --for=pull -n $OPENSHIFT_PROJECT_PRD

    # ✅ Patch deployment dengan imagePullSecret
    - |
      ./oc patch deployment insider-nest -p \
        '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"harbor-secret"}]}}}}'

    # Deploy image baru
    - CONTAINER_NAME=$(./oc get deployment insider-nest -o jsonpath='{.spec.template.spec.containers[0].name}')
    - ./oc set image deployment/insider-nest $CONTAINER_NAME=$IMAGE_NAME:$CI_COMMIT_SHA

    - ./oc rollout status deployment/insider-nest

  only:
    - main
    - tags