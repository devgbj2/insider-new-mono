stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $HARBOR_URL/$HARBOR_PATH/insider-nest

# =========================
# BUILD (FE + BE)
# =========================
build_app:
  stage: build
  image: node:20
  script:
    # ===== BUILD REACT =====
    - cd insider-fe
    - npm ci
    - npm run build

    # ===== BUILD NEST =====
    - cd ../insider-nest
    - npm ci

    # copy FE build ke Nest
    - mkdir -p public
    - cp -r ../insider-fe/dist/* public/

    # prisma generate
    - npx prisma generate

    # build nest
    - npm run build

  artifacts:
    paths:
      - insider-nest

# =========================
# DOCKER + HARBOR + OKD (PROD ONLY)
# =========================
deploy_prod:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build_app
  before_script:
    - docker login $HARBOR_URL -u $HARBOR_USER -p $HARBOR_PASS
  script:
  # build image
  - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA -f insider-nest/Dockerfile .

  # push ke harbor
  - docker push $IMAGE_NAME:$CI_COMMIT_SHA

  # install dependencies
  - apk add --no-cache curl libc6-compat

  # install oc
  - curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
  - tar -xvf oc.tar.gz
  - chmod +x oc

  # debug (optional but smart)
  - ls -la oc

  # login
  - ./oc login $OPENSHIFT_SERVER_PRD --username=$OPENSHIFT_USER_PRD --password=$OPENSHIFT_PASS_PRD --insecure-skip-tls-verify
  - ./oc project $OPENSHIFT_PROJECT_PRD

  # deploy
  - ./oc set image deployment/insider-nest insider-nest=$IMAGE_NAME:$CI_COMMIT_SHA --record
  - ./oc rollout status deployment/insider-nest
  
  only:
    - main
    - tags