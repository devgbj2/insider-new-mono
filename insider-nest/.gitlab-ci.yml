stages:
  - build
  - migrate
  - deploy

# ==========================================
# GLOBAL VARIABLES
# ==========================================
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: 1
  CONTAINER_IMAGE: $HARBOR_URL/$HARBOR_PATH/$CI_PROJECT_NAME

# ==========================================
# BUILD & PUSH IMAGE
# ==========================================
build-job:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - export VERSION_TAG=${CI_COMMIT_SHORT_SHA}
    - export CONTAINER_RELEASE_IMAGE=$CONTAINER_IMAGE:$VERSION_TAG
    - export CONTAINER_RELEASE_LATEST=$CONTAINER_IMAGE:latest

    - echo "VERSION_TAG=$VERSION_TAG" >> build.env
    - echo "CONTAINER_RELEASE_IMAGE=$CONTAINER_RELEASE_IMAGE" >> build.env

    # Secure login
    - echo "$HARBOR_PASS" | docker login $HARBOR_URL -u "$HARBOR_USER" --password-stdin

    # Build image (BuildKit enabled)
    - docker build -t $CONTAINER_RELEASE_IMAGE .

    # Push versioned image
    - docker push $CONTAINER_RELEASE_IMAGE

    # Tag & push latest
    - docker tag $CONTAINER_RELEASE_IMAGE $CONTAINER_RELEASE_LATEST
    - docker push $CONTAINER_RELEASE_LATEST

  artifacts:
    reports:
      dotenv: build.env

# ==========================================
# DATABASE MIGRATION (SAFE)
# ==========================================
migrate-job:
  stage: migrate
  image: $CONTAINER_RELEASE_IMAGE
  needs:
    - job: build-job
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    NPM_CONFIG_CACHE: /tmp/.npm
  script:
    - npx prisma migrate deploy

# ==========================================
# DEPLOY TO OKD
# ==========================================
deploy-job:
  stage: deploy
  image: openshift/origin-cli:latest
  tags:
    - docker
  needs:
    - job: build-job
      artifacts: true
    - job: migrate-job
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - oc login --server=$OPENSHIFT_SERVER -u $OPENSHIFT_USER -p $OPENSHIFT_PASS --insecure-skip-tls-verify
    - oc project $OPENSHIFT_PROJECT
  script:
    - echo "Updating DeploymentConfig '$OPENSHIFT_NAME' to $CONTAINER_RELEASE_IMAGE"
    - oc set image dc/$OPENSHIFT_NAME container=$CONTAINER_RELEASE_IMAGE --record
    - oc rollout status dc/$OPENSHIFT_NAME --watch=true --timeout=5m